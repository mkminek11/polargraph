<svg xmlns="http://www.w3.org/2000/svg" width="860" height="640" viewBox="0 0 860 640" font-family="Consolas, 'Courier New', monospace">
  <rect x="0" y="0" width="860" height="640" fill="#f4f4f2"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1b1c19">Polargraph Wiring — One Arduino, Two Motors</text>

  <!-- Raspberry Pi -->
  <rect x="310" y="50" width="240" height="56" rx="3" fill="#ffffff" stroke="#9a9c96" stroke-width="1.5"/>
  <text x="430" y="83" text-anchor="middle" font-size="14" fill="#1b1c19">Raspberry Pi 4</text>

  <!-- Pi -> Arduino -->
  <line x1="430" y1="106" x2="430" y2="150" stroke="#1b1c19" stroke-width="1.5"/>
  <text x="445" y="132" font-size="11" fill="#6b6d66">USB (serial,</text>
  <text x="445" y="145" font-size="11" fill="#6b6d66">115200 baud)</text>

  <!-- Arduino -->
  <rect x="290" y="150" width="280" height="60" rx="3" fill="#ffffff" stroke="#d65f2b" stroke-width="2"/>
  <text x="430" y="185" text-anchor="middle" font-size="14" fill="#1b1c19">Arduino Uno</text>

  <!-- Arduino to LEFT driver: 4 signal lines -->
  <line x1="320" y1="210" x2="140" y2="270" stroke="#2b6cb0" stroke-width="1"/>
  <line x1="335" y1="210" x2="160" y2="270" stroke="#2b6cb0" stroke-width="1"/>
  <line x1="350" y1="210" x2="180" y2="270" stroke="#2b6cb0" stroke-width="1"/>
  <line x1="365" y1="210" x2="200" y2="270" stroke="#2b6cb0" stroke-width="1"/>
  <text x="200" y="240" font-size="11" fill="#2b6cb0">D8,D9,D10,D11 -&gt; IN1..IN4</text>

  <!-- Arduino to RIGHT driver: 4 signal lines -->
  <line x1="495" y1="210" x2="660" y2="270" stroke="#2b6cb0" stroke-width="1"/>
  <line x1="510" y1="210" x2="680" y2="270" stroke="#2b6cb0" stroke-width="1"/>
  <line x1="525" y1="210" x2="700" y2="270" stroke="#2b6cb0" stroke-width="1"/>
  <line x1="540" y1="210" x2="720" y2="270" stroke="#2b6cb0" stroke-width="1"/>
  <text x="560" y="240" font-size="11" fill="#2b6cb0">D2,D3,D4,D5 -&gt; IN1..IN4</text>

  <!-- LEFT ULN2003 driver -->
  <rect x="40" y="270" width="200" height="60" rx="3" fill="#ffffff" stroke="#9a9c96" stroke-width="1.5"/>
  <text x="140" y="298" text-anchor="middle" font-size="13" fill="#1b1c19">ULN2003 Driver #1</text>
  <text x="140" y="316" text-anchor="middle" font-size="11" fill="#6b6d66">(LEFT motor)</text>

  <!-- RIGHT ULN2003 driver -->
  <rect x="620" y="270" width="200" height="60" rx="3" fill="#ffffff" stroke="#9a9c96" stroke-width="1.5"/>
  <text x="720" y="298" text-anchor="middle" font-size="13" fill="#1b1c19">ULN2003 Driver #2</text>
  <text x="720" y="316" text-anchor="middle" font-size="11" fill="#6b6d66">(RIGHT motor)</text>

  <!-- Driver -> Motor (thick 5-pin cable) -->
  <line x1="140" y1="330" x2="140" y2="390" stroke="#1b1c19" stroke-width="3"/>
  <text x="150" y="365" font-size="11" fill="#6b6d66">5-pin JST</text>
  <line x1="720" y1="330" x2="720" y2="390" stroke="#1b1c19" stroke-width="3"/>
  <text x="730" y="365" font-size="11" fill="#6b6d66">5-pin JST</text>

  <!-- LEFT motor -->
  <rect x="40" y="390" width="200" height="60" rx="3" fill="#ffffff" stroke="#9a9c96" stroke-width="1.5"/>
  <text x="140" y="418" text-anchor="middle" font-size="13" fill="#1b1c19">28BYJ-48 Stepper</text>
  <text x="140" y="436" text-anchor="middle" font-size="11" fill="#6b6d66">(LEFT, on 20mm drum)</text>

  <!-- RIGHT motor -->
  <rect x="620" y="390" width="200" height="60" rx="3" fill="#ffffff" stroke="#9a9c96" stroke-width="1.5"/>
  <text x="720" y="418" text-anchor="middle" font-size="13" fill="#1b1c19">28BYJ-48 Stepper</text>
  <text x="720" y="436" text-anchor="middle" font-size="11" fill="#6b6d66">(RIGHT, on 20mm drum)</text>

  <!-- Power supply -->
  <rect x="330" y="500" width="200" height="56" rx="3" fill="#ffffff" stroke="#b3261e" stroke-width="1.5"/>
  <text x="430" y="524" text-anchor="middle" font-size="13" fill="#1b1c19">External 5V Supply</text>
  <text x="430" y="541" text-anchor="middle" font-size="11" fill="#6b6d66">(or Arduino 5V pin)</text>

  <!-- Power lines: supply -> both drivers' 5V/GND terminals -->
  <line x1="330" y1="520" x2="140" y2="330" stroke="#b3261e" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="530" y1="520" x2="720" y2="330" stroke="#b3261e" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="180" y="440" font-size="11" fill="#b3261e">5V / GND</text>
  <text x="640" y="440" font-size="11" fill="#b3261e">5V / GND</text>

  <!-- Common ground: supply -> Arduino GND -->
  <line x1="430" y1="500" x2="430" y2="210" stroke="#1b1c19" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="440" y="470" font-size="11" fill="#6b6d66">common GND</text>

  <!-- Legend -->
  <text x="20" y="600" font-size="11" fill="#6b6d66">— solid black: USB / mechanical &nbsp; — blue: digital signal (D8-11, D2-5) &nbsp; — dashed red: power &nbsp; — dotted black: common ground</text>
  <text x="20" y="618" font-size="11" fill="#6b6d66">Full pin table and calibration notes: WIRING.md</text>
</svg>
